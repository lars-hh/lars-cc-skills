divergence_notes: |
  - Renamed frontmatter `name: "skill-security-auditor"` → `name: security-auditor`
    to match the marketplace plugin name in marketplace.json.
  - Added `version: 1.0.0` and `license: MIT` to the frontmatter for refined-skill
    convention parity with humanizer and obsidian-markdown.
  - Extended description with use case (8) — lars-cc-skills marketplace compliance
    check — and the new trigger phrase "marketplace compliance check".
  - Added a Modes table at the top of the skill body distinguishing the generic
    security scanner (upstream Python script, unchanged) from the new marketplace
    compliance wrapper.
  - Added new section "Marketplace Compliance Mode (lars-cc-skills)" documenting
    three checks: LICENSE file presence + SPDX allow-list, allowed-tools
    whitelist discipline, frontmatter schema compliance.
  - Added new script `scripts/marketplace_audit.sh` (~170 LOC bash + embedded
    python3) implementing the three checks. Supports per-skill or `--all` mode
    plus optional `--with-security` flag to chain the upstream scanner.
  - Allow-listed SPDX identifiers (MIT, Apache-2.0, BSD-*, ISC) mirror the
    repo-level `scripts/audit-license.sh` policy.
  - Upstream Python scanner (`scripts/skill_security_auditor.py`) and
    `references/threat-model.md` are unchanged — preserved verbatim.
known_deviations: |
  - Pure markdown structure (no <objective>, <quick_start>, <success_criteria>
    XML tags) — deviates from the skill-auditor agent's pure-XML standard.
    Decision: deferred to v0.2 as a documented deviation, consistent with the
    same deferral on humanizer + obsidian-markdown. Rationale: rewriting a
    1066-LOC script's reference doc to XML is high effort with low marginal
    value for v0.1.0.
