divergence_notes: |
  - vanilla (body and frontmatter verbatim from upstream; no name rename
    needed as `name: jq` already matches the marketplace plugin name)
known_deviations: |
  - Pure markdown structure (no XML tags) — consistent with the other
    vanilla and refined skills in this marketplace. v0.2 deferral.
  - Description reads as a tool definition ("JSON processor for filtering,
    transforming, and manipulating JSON data in command line.") rather than
    an invocation trigger. The skill-auditor 2026-05-19 review proposed
    rewriting to "Provides jq filter syntax and command patterns for
    querying, transforming, and reshaping JSON data at the command line.
    Use when composing or debugging jq filter expressions." Not fixed here
    because changing the description body breaks vanilla status. v0.2
    deferral.
  - Grammar in description: "in command line" → "at the command line".
    Same v0.2 deferral rationale.
  - `allowed-tools` not declared. For vanilla skills this is acceptable
    per the workflow doc, but a future refinement should add
    `allowed-tools: Bash(jq:*), Read` since every example in the body
    shells out to `jq`.
notes: |
  - 310 stars on the upstream repo (verified 2026-05-19). Smaller than the
    other vanilla sources but the skill itself is focused and high-quality:
    a CLI reference for jq with concrete usage examples.
  - Bus-factor: medium. fallback_source: lanej/dotfiles is documented as
    an ideas source but its own LICENSE has not been verified — if
    majiayu000 disappears, lanej would need a separate license check
    before being adopted as upstream.
  - The repo is a `claude-skill-registry` collection (registry-style, not
    aggregator-style). majiayu000 is the original author of this jq skill,
    not a redistributor.
