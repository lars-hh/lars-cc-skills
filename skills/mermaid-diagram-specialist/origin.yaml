notes: |
  - davila7/claude-code-templates is an aggregator repo (27k+ stars at
    time of import). Per the marketplace's Lesson 4, we tried to find a
    dedicated upstream for mermaid-diagram-specialist before falling back
    to davila7, but no dedicated upstream surfaced via the standard
    search (gh search repos "mermaid-diagram-specialist skill" returned
    no canonical hit, and the SKILL.md header carries no original-author
    attribution beyond what davila7 publishes).
  - Pattern from Phase 2.1 (humanizer) and 2.2 (obsidian-markdown)
    suggests davila7 occasionally ships skills slightly stale or without
    original-author attribution. Two checks performed on import:
    (a) frontmatter looks self-contained and well-authored;
    (b) references/ structure (6 deep-dive files) suggests substantial
    effort by whoever wrote it — likely davila7 themselves or a
    contributor.
  - No fallback_source identified. If davila7 disappears, a cleanroom
    reimplementation from Mermaid's official syntax docs
    (https://mermaid.js.org/intro/) is the practical path.
  - The marketplace.json plugin description was already
    "Generate Mermaid diagrams (flowchart, sequence, ERD, C4, state,
    Gantt) from text descriptions." — matches the skill content well.
